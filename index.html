<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3S技术巅峰对决 | 珠峰挑战赛 · 竞速版</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0b2f3c 0%, #1c5a7a 100%);
            font-family: 'Segoe UI', 'PingFang SC', 'Roboto', 'Microsoft YaHei', sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .arena {
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: stretch;
        }

        .player-zone {
            flex: 1;
            min-width: 380px;
            max-width: 780px;
            background: rgba(255, 250, 240, 0.95);
            border-radius: 64px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 2px solid rgba(255,215,150,0.8);
        }

        .team-header {
            padding: 20px 20px 12px;
            text-align: center;
            background: #2c3e2f;
            color: #ffefc0;
        }
        .team-name {
            font-size: 2rem;
            font-weight: 800;
            background: #f7b05e;
            display: inline-block;
            padding: 5px 25px;
            border-radius: 60px;
            color: #2d2b1a;
            box-shadow: inset 0 -2px 0 #aa6f2c, 0 4px 8px rgba(0,0,0,0.2);
        }
        .timer-area {
            font-size: 1.1rem;
            margin-top: 10px;
            background: #1f2f28b3;
            border-radius: 40px;
            padding: 8px 15px;
            display: inline-block;
            font-weight: bold;
        }
        .score-board {
            display: flex;
            justify-content: space-between;
            padding: 10px 30px;
            background: #eadbbe;
            font-weight: bold;
            font-size: 1.1rem;
            color: #3a2c1c;
            border-bottom: 3px solid #ffb347;
        }

        .quiz-core {
            padding: 20px 25px 30px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .q-counter {
            background: #2c5f6e;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            margin-bottom: 15px;
            align-self: flex-start;
        }
        .question-text {
            background: #fff3e0;
            padding: 25px 15px;
            border-radius: 48px;
            font-size: 1.45rem;
            font-weight: 700;
            line-height: 1.4;
            text-align: center;
            margin: 15px 0 25px;
            box-shadow: inset 0 0 0 2px white, 0 8px 16px rgba(0,0,0,0.1);
            min-height: 170px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1f3d47;
        }
        .options {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px 0 15px;
        }
        .tech-opt {
            flex: 1;
            min-width: 100px;
            background: #2b6c4e;
            border: none;
            font-size: 1.4rem;
            font-weight: bold;
            padding: 14px 0;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 6px 0 #18422f;
            font-family: monospace;
        }
        .tech-opt.rs { background: #2f6b47; box-shadow: 0 6px 0 #1b3e2a; }
        .tech-opt.gnss { background: #2a6f8f; box-shadow: 0 6px 0 #144655; }
        .tech-opt.gis { background: #b1622c; box-shadow: 0 6px 0 #6d3a13; }
        .tech-opt:active { transform: translateY(2px); box-shadow: 0 3px 0 #18422f; }
        .tech-opt.disabled-btn, .tech-opt:disabled {
            opacity: 0.5;
            transform: translateY(0);
            cursor: not-allowed;
        }
        .feedback {
            background: #ebdbc4;
            border-radius: 48px;
            padding: 10px;
            text-align: center;
            font-size: 0.95rem;
            font-weight: bold;
            margin-top: 12px;
        }
        .victory-stamp {
            text-align: center;
            margin-top: 12px;
            font-size: 1rem;
            font-weight: bold;
            background: gold;
            padding: 6px;
            border-radius: 60px;
            color: #1f3a24;
            display: none;
        }
        .reset-area {
            padding: 15px;
            text-align: center;
            background: #d9c7a6;
            border-top: 2px solid #c5a16b;
        }
        .reset-btn {
            background: #ff8c42;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
            color: white;
            transition: 0.1s;
            box-shadow: 0 2px 4px black;
        }
        .reset-btn:active {
            transform: scale(0.97);
        }
        footer {
            text-align: center;
            color: #f2e6cf;
            margin-top: 28px;
            font-size: 0.8rem;
            width: 100%;
        }
        .winner-permanent-flag {
            text-align: center;
            padding: 8px;
            font-weight: bold;
            margin: 0 15px 10px 15px;
            border-radius: 40px;
            font-size: 1rem;
            border: 1px solid gold;
        }
        .custom-alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2c3e2f;
            color: #ffefc0;
            padding: 28px 40px;
            border-radius: 60px;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            z-index: 1000;
            border: 4px solid gold;
            backdrop-filter: blur(4px);
            white-space: nowrap;
            font-family: inherit;
        }
        .custom-alert button {
            margin-top: 20px;
            padding: 8px 28px;
            font-size: 1.2rem;
            background: #f7b05e;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }
        @media (max-width: 880px) {
            body { padding: 15px; }
            .player-zone { min-width: 320px; }
            .question-text { font-size: 1.1rem; }
            .team-name { font-size: 1.4rem; }
            .tech-opt { font-size: 1rem; }
            .custom-alert { font-size: 1.2rem; padding: 18px 25px; white-space: normal; width: 80%; }
        }
    </style>
</head>
<body>
<div class="arena">
    <div class="player-zone" id="leftZone">
        <div class="team-header" style="background: #7e2a2a;">
            <div class="team-name">🗻 珠峰南坡队</div>
            <div class="timer-area">⏱️ 耗时: <span id="leftTimer">0.00</span> 秒</div>
        </div>
        <div class="score-board">
            <span>✅ 完成进度</span>
            <span id="leftProgress">0 / 16</span>
        </div>
        <div class="quiz-core">
            <div class="q-counter" id="leftQCounter">第1 / 16题</div>
            <div class="question-text" id="leftQuestion"></div>
            <div class="options">
                <button class="tech-opt rs" data-tech="RS" data-side="left">🛰️ RS</button>
                <button class="tech-opt gnss" data-tech="GNSS" data-side="left">📍 GNSS</button>
                <button class="tech-opt gis" data-tech="GIS" data-side="left">🗺️ GIS</button>
            </div>
            <div class="feedback" id="leftFeedback">⚡ 点击选项，正确自动下一题！<br>⚠️ 错误惩罚：第1次+2秒，第2次再+3秒，后续每次+2秒</div>
            <div id="leftVictoryMsg" class="victory-stamp">🏆 已完成所有题目！🏆</div>
        </div>
        <div class="reset-area">
            <button class="reset-btn" data-reset="left">🔄 重置南坡队</button>
        </div>
    </div>

    <div class="player-zone" id="rightZone">
        <div class="team-header" style="background: #1d5e6e;">
            <div class="team-name">🏔️ 珠峰北坡队</div>
            <div class="timer-area">⏱️ 耗时: <span id="rightTimer">0.00</span> 秒</div>
        </div>
        <div class="score-board">
            <span>✅ 完成进度</span>
            <span id="rightProgress">0 / 16</span>
        </div>
        <div class="quiz-core">
            <div class="q-counter" id="rightQCounter">第1 / 16题</div>
            <div class="question-text" id="rightQuestion"></div>
            <div class="options">
                <button class="tech-opt rs" data-tech="RS" data-side="right">🛰️ RS</button>
                <button class="tech-opt gnss" data-tech="GNSS" data-side="right">📍 GNSS</button>
                <button class="tech-opt gis" data-tech="GIS" data-side="right">🗺️ GIS</button>
            </div>
            <div class="feedback" id="rightFeedback">⚡ 点击选项，正确自动下一题！<br>⚠️ 错误惩罚：第1次+2秒，第2次再+3秒，后续每次+2秒</div>
            <div id="rightVictoryMsg" class="victory-stamp">🏆 已完成所有题目！🏆</div>
        </div>
        <div class="reset-area">
            <button class="reset-btn" data-reset="right">🔄 重置北坡队</button>
        </div>
    </div>
</div>
<footer>
    🧭 3S技术 · 极限竞速 | 每道题可无限尝试，但错误会累加时间（第1次+2s，第2次+3s，后续每次+2s）| 双方全部完成后弹窗宣布获胜者
</footer>

<script>
    // 题库16道 (精选，保留珠峰核心及典型拓展)
    const QUESTIONS = [
        { text: "【珠峰测高】使用卫星照片找出东绒布冰川表面的冰裂缝，应该用哪种技术？", correct: "RS" },
        { text: "【精准农业】用无人机拍摄麦田照片，看出哪块地的小麦长得不好，需要多施肥。这是哪种技术的应用？", correct: "RS" },
        { text: "【城市内涝】暴雨后，通过卫星照片快速找出哪些路段有积水。这属于哪种技术？", correct: "RS" },
        { text: "【野生动物保护】给藏羚羊戴上GPS项圈，随时知道它们走到哪里。这是哪种技术？", correct: "GNSS" },
        { text: "【地震应急】通过对比地震前后的卫星照片，判断哪些房屋倒塌了。用哪种技术？", correct: "RS" },
        { text: "【智慧物流】快递员用手机定位找到自己当前位置，然后规划送货路线。规划路线用了哪种技术？", correct: "GIS" },
        { text: "【林业防火】把森林地图、天气数据和火点位置叠加在一起，预测火会往哪烧。这是哪种技术？", correct: "GIS" },
        { text: "【珠峰测高】登顶队员打开接收机，连续40分钟接收北斗卫星信号，算出海拔高度。用哪种技术？", correct: "GNSS" },
        { text: "【精准农业】收割机上装了GPS，边收割边记录不同位置的小麦产量，最后生成一张产量地图。记录位置主要靠哪种技术？", correct: "GNSS" },
        { text: "【城市规划】把人口分布、学校位置和交通路线放在一起分析，决定在哪里建新学校。这是哪种技术？", correct: "GIS" },
        { text: "【考古探测】用雷达卫星影像发现地下可能有古墓的痕迹。这是哪种技术的应用？", correct: "RS" },
        { text: "【精准农业】把土壤肥力地图、小麦长势照片和GPS位置结合起来，生成一张“施肥处方图”，告诉无人机哪里多施肥。这主要靠哪种技术？", correct: "GIS" },
        { text: "【自动驾驶】汽车用GPS定位自己在哪里，再结合电子地图决定转弯还是直行。这里最关键的位置获取技术是？", correct: "GNSS" },
        { text: "【户外救援】被困者用手机发出GPS坐标，救援队据此找到他。这依赖哪种技术？", correct: "GNSS" },
        { text: "【生态保护】把藏羚羊迁徙路线、公路和铁路地图叠在一起，找出哪里容易被车撞。这是哪种技术的分析？", correct: "GIS" },
        { text: "【冰川监测】对比不同年份的珠峰卫星照片，看出冰川在慢慢后退。用哪种技术？", correct: "RS" }
    ];
    const TOTAL_QS = 16;

    let gameFinished = false;
    let leftCompleted = false;
    let rightCompleted = false;
    let leftFinishSeconds = null;
    let rightFinishSeconds = null;

    function showWinnerPopup(winnerName, leftTime, rightTime) {
        if (gameFinished) return;
        gameFinished = true;
        let message = "";
        if (winnerName === "平局") {
            message = `🏆 平局！\n两队均以 ${leftTime.toFixed(2)} 秒完成比赛！ 🏆`;
        } else {
            const winnerTime = (winnerName === "珠峰南坡队") ? leftTime : rightTime;
            const loserTime = (winnerName === "珠峰南坡队") ? rightTime : leftTime;
            message = `🎉 ${winnerName} 获胜！ 🎉\n用时 ${winnerTime.toFixed(2)} 秒\n对手用时 ${loserTime.toFixed(2)} 秒`;
        }
        const modal = document.createElement('div');
        modal.className = 'custom-alert';
        modal.innerHTML = `<div>${message.replace(/\n/g, '<br>')}</div><button id="closeWinnerAlert">确定</button>`;
        document.body.appendChild(modal);
        document.getElementById('closeWinnerAlert').onclick = () => modal.remove();
        const leftZone = document.getElementById('leftZone');
        const rightZone = document.getElementById('rightZone');
        const addFlag = (zone, msg, bg) => {
            if (!zone) return;
            let old = zone.querySelector('.winner-permanent-flag');
            if (old) old.remove();
            const flag = document.createElement('div');
            flag.className = 'winner-permanent-flag';
            flag.innerText = msg;
            flag.style.backgroundColor = bg;
            zone.querySelector('.quiz-core').appendChild(flag);
        };
        if (winnerName === "珠峰南坡队") {
            addFlag(leftZone, '🏆 获胜队伍 🏆', '#ffbe76');
            addFlag(rightZone, '惜败，再接再厉', '#c0a07a');
        } else if (winnerName === "珠峰北坡队") {
            addFlag(rightZone, '🏆 获胜队伍 🏆', '#ffbe76');
            addFlag(leftZone, '惜败，再接再厉', '#c0a07a');
        } else {
            addFlag(leftZone, '平局完赛', '#ffbe76');
            addFlag(rightZone, '平局完赛', '#ffbe76');
        }
    }

    function checkBothComplete() {
        if (gameFinished) return;
        if (leftCompleted && rightCompleted && leftFinishSeconds !== null && rightFinishSeconds !== null) {
            if (leftFinishSeconds < rightFinishSeconds) showWinnerPopup("珠峰南坡队", leftFinishSeconds, rightFinishSeconds);
            else if (rightFinishSeconds < leftFinishSeconds) showWinnerPopup("珠峰北坡队", leftFinishSeconds, rightFinishSeconds);
            else showWinnerPopup("平局", leftFinishSeconds, rightFinishSeconds);
        }
    }

    class PlayerGame {
        constructor(side, timerId, progressId, qCounterId, questionId, feedbackId, victoryId) {
            this.side = side;
            this.currentIndex = 0;
            this.completed = false;
            this.startTime = null;
            this.timerInterval = null;
            this.timerRunning = false;
            this.finishSeconds = null;
            this.currentQuestionWrongCount = 0;
            this.penaltySeconds = 0;
            
            this.timerSpan = document.getElementById(timerId);
            this.progressSpan = document.getElementById(progressId);
            this.qCounterSpan = document.getElementById(qCounterId);
            this.questionDiv = document.getElementById(questionId);
            this.feedbackDiv = document.getElementById(feedbackId);
            this.victoryMsgDiv = document.getElementById(victoryId);
            this.optionBtns = document.querySelectorAll(`.tech-opt[data-side="${side}"]`);
            this.resetBtn = document.querySelector(`[data-reset="${side}"]`);
            
            if (this.resetBtn) {
                this.resetBtn.addEventListener('click', () => this.resetGame());
            }
            
            this.optionBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (this.completed) {
                        this.setFeedback("🏁 已完成所有题目，无法继续。如需重赛请按重置。", "#f3d9b1");
                        return;
                    }
                    if (!this.timerRunning && this.currentIndex === 0 && !this.completed) {
                        this.startTimer();
                    }
                    const selectedTech = btn.getAttribute('data-tech');
                    this.checkAnswer(selectedTech);
                });
            });
            this.updateDisplay();
        }

        setFeedback(msg, bgColor) {
            this.feedbackDiv.innerHTML = msg;
            this.feedbackDiv.style.backgroundColor = bgColor;
        }

        getCurrentDisplayTime() {
            if (!this.timerRunning || !this.startTime) return this.penaltySeconds;
            const elapsed = (Date.now() - this.startTime) / 1000;
            return elapsed + this.penaltySeconds;
        }

        updateTimerDisplay() {
            if (this.timerSpan) {
                this.timerSpan.innerText = this.getCurrentDisplayTime().toFixed(2);
            }
        }

        startTimer() {
            if (this.timerRunning || this.completed) return;
            this.startTime = Date.now();
            this.timerRunning = true;
            this.timerInterval = setInterval(() => {
                if (!this.timerRunning || this.completed) return;
                this.updateTimerDisplay();
            }, 100);
        }

        stopAndRecordTime() {
            if (this.timerInterval) {
                clearInterval(this.timerInterval);
                this.timerInterval = null;
            }
            this.timerRunning = false;
            if (this.startTime) {
                this.finishSeconds = (Date.now() - this.startTime) / 1000 + this.penaltySeconds;
                this.timerSpan.innerText = this.finishSeconds.toFixed(2);
            } else {
                this.finishSeconds = this.penaltySeconds;
                this.timerSpan.innerText = this.finishSeconds.toFixed(2);
            }
        }

        getPenaltyForCurrentWrong() {
            const count = this.currentQuestionWrongCount + 1;
            if (count === 1) return 2;
            if (count === 2) return 3;
            return 2;
        }

        applyPenalty() {
            const add = this.getPenaltyForCurrentWrong();
            this.penaltySeconds += add;
            this.updateTimerDisplay();
            this.currentQuestionWrongCount++;
            return add;
        }

        checkAnswer(selected) {
            if (this.completed) return;
            const currentQ = QUESTIONS[this.currentIndex];
            if (!currentQ) return;
            const isCorrect = (selected === currentQ.correct);
            
            if (isCorrect) {
                this.currentQuestionWrongCount = 0;
                this.setFeedback(`✅ 正确！ 进入下一题`, "#cfe9cd");
                this.currentIndex++;
                this.updateDisplay();
                if (this.currentIndex === TOTAL_QS) {
                    this.completeGame();
                }
            } else {
                const penalty = this.applyPenalty();
                const remainingMsg = this.currentQuestionWrongCount === 1 ? "下次再错+3秒" : (this.currentQuestionWrongCount === 2 ? "后续每次+2秒" : "");
                this.setFeedback(`❌ 回答错误！ +${penalty}秒 ${remainingMsg}，请重新选择`, "#ffe0cc");
                this.feedbackDiv.style.transform = "scale(0.98)";
                setTimeout(() => { if(this.feedbackDiv) this.feedbackDiv.style.transform = ""; }, 200);
            }
        }

        updateDisplay() {
            if (this.completed) {
                this.progressSpan.innerText = `${TOTAL_QS} / ${TOTAL_QS}`;
                this.qCounterSpan.innerText = `完成！ ${TOTAL_QS}/${TOTAL_QS}`;
                return;
            }
            const idx = this.currentIndex;
            this.progressSpan.innerText = `${idx} / ${TOTAL_QS}`;
            if (idx < TOTAL_QS) {
                this.qCounterSpan.innerText = `第${idx+1} / ${TOTAL_QS}题`;
                this.questionDiv.innerText = QUESTIONS[idx].text;
            } else {
                this.questionDiv.innerText = "✨ 恭喜！所有题目已完成！ ✨";
                this.qCounterSpan.innerText = `完成！ ${TOTAL_QS}/${TOTAL_QS}`;
            }
        }

        completeGame() {
            if (this.completed) return;
            this.stopAndRecordTime();
            this.completed = true;
            this.victoryMsgDiv.style.display = "block";
            this.progressSpan.innerText = `${TOTAL_QS} / ${TOTAL_QS}`;
            this.qCounterSpan.innerText = `完成！ ${TOTAL_QS}/${TOTAL_QS}`;
            this.setFeedback(`🎉 已完成全部${TOTAL_QS}题！ 最终用时 ${this.finishSeconds.toFixed(2)} 秒 🎉`, "#ffda9e");
            this.optionBtns.forEach(btn => {
                btn.disabled = true;
                btn.classList.add("disabled-btn");
            });
            
            if (this.side === 'left') {
                leftCompleted = true;
                leftFinishSeconds = this.finishSeconds;
            } else {
                rightCompleted = true;
                rightFinishSeconds = this.finishSeconds;
            }
            checkBothComplete();
        }

        resetGame() {
            if (gameFinished) {
                gameFinished = false;
                leftCompleted = false;
                rightCompleted = false;
                leftFinishSeconds = null;
                rightFinishSeconds = null;
                document.querySelectorAll('.winner-permanent-flag').forEach(f => f.remove());
                const modals = document.querySelectorAll('.custom-alert');
                modals.forEach(m => m.remove());
            } else {
                if (this.side === 'left' && leftCompleted) {
                    leftCompleted = false;
                    leftFinishSeconds = null;
                }
                if (this.side === 'right' && rightCompleted) {
                    rightCompleted = false;
                    rightFinishSeconds = null;
                }
                document.querySelectorAll('.winner-permanent-flag').forEach(f => f.remove());
                gameFinished = false;
            }
            if (this.timerInterval) {
                clearInterval(this.timerInterval);
                this.timerInterval = null;
            }
            this.completed = false;
            this.currentIndex = 0;
            this.timerRunning = false;
            this.startTime = null;
            this.finishSeconds = null;
            this.currentQuestionWrongCount = 0;
            this.penaltySeconds = 0;
            this.timerSpan.innerText = "0.00";
            this.victoryMsgDiv.style.display = "none";
            this.optionBtns.forEach(btn => {
                btn.disabled = false;
                btn.classList.remove("disabled-btn");
            });
            this.updateDisplay();
            this.setFeedback("🔄 游戏已重置，点击选项开始计时！（错误累进罚时）", "#ebdbc4");
        }
    }

    const leftGame = new PlayerGame('left', 'leftTimer', 'leftProgress', 'leftQCounter', 'leftQuestion', 'leftFeedback', 'leftVictoryMsg');
    const rightGame = new PlayerGame('right', 'rightTimer', 'rightProgress', 'rightQCounter', 'rightQuestion', 'rightFeedback', 'rightVictoryMsg');
</script>
</body>
</html>
